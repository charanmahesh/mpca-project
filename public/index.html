<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart Parking System — Real-time RFID-based parking management dashboard">
  <title>Smart Parking System</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%233b82f6' rx='20' width='100' height='100'/><text x='50' y='72' font-size='60' fill='white' text-anchor='middle' font-weight='bold'>P</text></svg>">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">P</div>
        <div class="brand-text">
          <h1>SmartPark</h1>
          <span>Parking System</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
          <span class="nav-text">Dashboard</span>
        </a>
        <a class="nav-item" data-page="users" id="nav-users">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/></svg></span>
          <span class="nav-text">Users</span>
        </a>
        <a class="nav-item" data-page="logs" id="nav-logs">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
          <span class="nav-text">Access Logs</span>
        </a>
        <a class="nav-item" data-page="slots" id="nav-slots">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></span>
          <span class="nav-text">Parking Zones</span>
        </a>

        <div class="nav-section-label">Tools</div>
        <a class="nav-item" data-page="simulate" id="nav-simulate">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 2v8L8 14h8l-2-4V2"/><path d="M8.5 2h7"/><path d="M7 14l-2 8h14l-2-8"/></svg></span>
          <span class="nav-text">Simulate Scan</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="mqtt-status" id="mqtt-status">
          <span class="status-dot disconnected" id="mqtt-dot"></span>
          <span class="mqtt-label" id="mqtt-label">MQTT Disconnected</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div id="page-content">
        <!-- Pages are rendered here by app.js -->
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Socket.IO Client (served automatically by socket.io server) -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- App Modules -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
